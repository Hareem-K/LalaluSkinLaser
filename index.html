<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lalalu Skin & Laser</title>

  <style>
    body {
      margin: 0;
      font-family: 'Helvetica Neue', sans-serif;
      background-color: #FAFAF8;
      color: #0F172A;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 500px;
      padding: 20px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      color: #4A6FA5;
      margin-bottom: 20px;
    }

    .dots::after {
      content: "...";
      animation: dots 1.5s infinite;
    }

    @keyframes dots {
      0% { content: "."; }
      33% { content: ".."; }
      66% { content: "..."; }
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="/lalalulogo.png" alt="Lalalu Logo" width="250" />
    <h1>Lalalu Skin & Laser</h1>
    <p>Our website is currently under maintenance<span class="dots"></span></p>
    <p>We’ll be back soon 💫</p>
  </div>
</body>
</html>
